os: linux
dist: jammy

addons:
  artifacts:
    region: us-west-2
    paths:
      - $(git ls-files -o deploy/*/*-*.tar.gz | tr "\n" ":")
    target_paths:
      - /

services:
  - docker

cache:
  directories:
    - $HOME/.buildx-cache

before_install:
  - docker buildx create --use --name blipbuilder --driver docker-container

script:
  # Build the test image with BuildKit local cache. Layers (base image,
  # apk chromium, yarn install) are restored from $HOME/.buildx-cache,
  # which Travis persists across jobs. mode=max caches every stage so the
  # production build below can also benefit.
  - |
    docker buildx build \
      --target test \
      --cache-from=type=local,src=$HOME/.buildx-cache \
      --cache-to=type=local,dest=$HOME/.buildx-cache-new,mode=max \
      --load -t blip-test .
  # Pre-warm the production target into the local Docker daemon so the
  # subsequent docker build inside artifact.sh hits warm layers.
  - |
    docker buildx build \
      --target production \
      --cache-from=type=local,src=$HOME/.buildx-cache \
      --cache-to=type=local,dest=$HOME/.buildx-cache-new,mode=max \
      --load -t blip .
  # Tests now run outside the build, so test-only churn doesn't bust the
  # deps layer and coverage output can be surfaced to Travis.
  - docker run --rm blip-test npm run test
  - ./artifact.sh

before_cache:
  # Atomic swap so the cache reflects the last successful build only,
  # preventing unbounded growth from incremental BuildKit writes.
  - rm -rf $HOME/.buildx-cache
  - mv $HOME/.buildx-cache-new $HOME/.buildx-cache
  - du -sh $HOME/.buildx-cache || true
