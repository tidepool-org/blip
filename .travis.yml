os: linux
dist: jammy

addons:
  artifacts:
    region: us-west-2
    paths:
      - $(git ls-files -o deploy/*/*-*.tar.gz | tr "\n" ":")
    target_paths:
      - /

services:
  - docker

cache:
  directories:
    - $HOME/docker-cache

before_install:
  # Restore the previous build's images so BuildKit can reuse layers
  # (apk chromium, yarn install) via --cache-from below.
  - if [ -f $HOME/docker-cache/images.tar ]; then docker load -i $HOME/docker-cache/images.tar; fi

script:
  # BUILDKIT_INLINE_CACHE=1 embeds cache metadata in the image so a
  # later build can use it as a --cache-from source.
  - |
    DOCKER_BUILDKIT=1 docker build \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      --target test \
      --cache-from blip-test \
      -t blip-test .
  - docker run --rm blip-test npm run test
  # Pre-build the production image with the same args artifact.sh will
  # use. This populates the daemon's BuildKit content cache so
  # artifact.sh's docker build hits cache for every layer (effectively
  # just a re-tag). Mirrors the logic in
  # https://raw.githubusercontent.com/tidepool-org/tools/master/artifact/artifact.sh
  #
  # We tag this build as tidepool/blip:cache rather than :latest because
  # artifact.sh's `docker build -t tidepool/blip` does NOT pass
  # BUILDKIT_INLINE_CACHE=1, so it would otherwise replace the :latest
  # tag with an image stripped of inline cache metadata, defeating
  # --cache-from on the next build.
  - |
    RX_ENABLED=${RX_ENABLED:-false}
    case ",${RX_ENABLED_BRANCHES:-}," in
      *",${TRAVIS_BRANCH},"*) RX_ENABLED=true ;;
    esac
    DOCKER_BUILDKIT=1 docker build \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      --build-arg ROLLBAR_POST_SERVER_TOKEN="${ROLLBAR_POST_SERVER_TOKEN:-}" \
      --build-arg LAUNCHDARKLY_CLIENT_TOKEN="${LAUNCHDARKLY_CLIENT_TOKEN:-}" \
      --build-arg REACT_APP_GAID="${REACT_APP_GAID:-}" \
      --build-arg RX_ENABLED="${RX_ENABLED}" \
      --build-arg TRAVIS_COMMIT="${TRAVIS_COMMIT}" \
      --cache-from tidepool/blip:cache \
      --target production \
      -t tidepool/blip:cache .
  - ./artifact.sh

before_cache:
  - mkdir -p $HOME/docker-cache
  - docker save blip-test tidepool/blip:cache -o $HOME/docker-cache/images.tar
  - du -sh $HOME/docker-cache/images.tar || true
