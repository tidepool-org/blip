os: linux
dist: jammy

addons:
  artifacts:
    region: us-west-2
    paths:
      - $(git ls-files -o deploy/*/*-*.tar.gz | tr "\n" ":")
    target_paths:
      - /

services:
  - docker

cache:
  directories:
    - $HOME/docker-cache

before_install:
  # Restore the previous build's test image so BuildKit can reuse its
  # layers (apk chromium, yarn install) via --cache-from below.
  - if [ -f $HOME/docker-cache/blip-test.tar ]; then docker load -i $HOME/docker-cache/blip-test.tar; fi

script:
  # BUILDKIT_INLINE_CACHE=1 embeds cache metadata in the image so a
  # later build can use it as a --cache-from source. No buildx-container
  # driver, so layers land directly in the daemon image store with no
  # --load overhead.
  - |
    DOCKER_BUILDKIT=1 docker build \
      --build-arg BUILDKIT_INLINE_CACHE=1 \
      --target test \
      --cache-from blip-test \
      -t blip-test .
  - docker run --rm blip-test npm run test
  - ./artifact.sh

before_cache:
  - mkdir -p $HOME/docker-cache
  - docker save blip-test -o $HOME/docker-cache/blip-test.tar
  - du -sh $HOME/docker-cache/blip-test.tar || true
